# nav2_params.yaml
# ================
# ROS 2 Nav2 파라미터 — 자율 장애물 회피 로봇
#
# 로봇 특성:
#   구동: 스키드-스티어 (비홀로노믹, 전/후진+회전)
#   LiDAR: RPLIDAR A1  /scan  (frame: lidar_link)
#   오도메트리: rf2o_laser_odometry (스캔 매칭, 엔코더 없음)
#   맵: maps/map.yaml (사전 빌드된 정적 맵)
#
# 비대칭 Footprint (base_link = LiDAR 위치 기준, 단위 m):
#   전방: +0.265 m,  좌측: +0.370 m
#   우측: -0.375 m,  후방: -0.570 m
#
# TF 트리: map → odom → base_footprint → base_link → lidar_link
#
# 수정 이력:
#   - global_costmap.global_frame: odom → map
#   - robot_base_frame: base_link → base_footprint (전체)
#   - amcl 섹션 추가
#   - collision_monitor 제거 (파라미터 없음 → lifecycle abort 방지)
#   - global_costmap rolling_window 제거, static_layer 활성화
#   - 관측 소스 frame: lidar_link

# ─────────────────────────────────────────────────────────────────────────
# AMCL (Monte Carlo Localization — 맵 기반 위치 추정)
# ─────────────────────────────────────────────────────────────────────────
amcl:
  ros__parameters:
    use_sim_time:         false
    alpha1:               0.2
    alpha2:               0.2
    alpha3:               0.2
    alpha4:               0.2
    alpha5:               0.2
    base_frame_id:        "base_footprint"
    beam_skip_distance:   0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold:  0.3
    do_beamskip:          false
    global_frame_id:      "map"
    lambda_short:         0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range:      100.0
    laser_min_range:      -1.0
    laser_model_type:     "likelihood_field"
    max_beams:            60
    max_particles:        2000
    min_particles:        500
    odom_frame_id:        "odom"
    pf_err:               0.05
    pf_z:                 0.99
    recovery_alpha_fast:  0.0
    recovery_alpha_slow:  0.0
    resample_interval:    1
    robot_model_type:     "nav2_amcl::DifferentialMotionModel"
    save_pose_rate:       0.5
    sigma_hit:            0.2
    tf_broadcast:         true
    transform_tolerance:  1.0
    update_min_a:         0.2
    update_min_d:         0.25
    z_hit:                0.5
    z_max:                0.05
    z_rand:               0.5
    z_short:              0.05
    scan_topic:           "/scan"
    map_topic:            "map"
    set_initial_pose:     false
    initial_pose:
      x:     0.0
      y:     0.0
      z:     0.0
      yaw:   0.0

# ─────────────────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time:          false
    global_frame:          map
    robot_base_frame:      base_footprint
    odom_topic:            /odom
    bt_loop_duration:      10
    default_server_timeout: 20
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node

# ─────────────────────────────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time:                 false
    controller_frequency:         10.0
    min_x_velocity_threshold:     0.001
    min_y_velocity_threshold:     0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance:            0.3
    progress_checker_plugin:      "progress_checker"
    goal_checker_plugins:         ["general_goal_checker"]
    controller_plugins:           ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance:  10.0

    general_goal_checker:
      stateful:        True
      plugin:          "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance:  0.5
      yaw_goal_tolerance: 0.5

    FollowPath:
      plugin:                              "dwb_core::DWBLocalPlanner"
      debug_trajectory_details:            True
      min_vel_x:                           0.0
      min_vel_y:                           0.0
      max_vel_x:                           0.22 # $로봇 직진 최대 속도
      max_vel_y:                           0.0
      max_vel_theta:                       1.0  # 로봇 회전 최대 회전 속도
      min_speed_xy:                        0.0
      max_speed_xy:                        0.22
      min_speed_theta:                     0.0
      acc_lim_x:                           2.5 # 급출발 속도
      acc_lim_y:                           0.0
      acc_lim_theta:                       3.2
      decel_lim_x:                         -2.5 # 급정지 속도
      decel_lim_y:                         0.0
      decel_lim_theta:                     -3.2
      vx_samples:                          20
      vy_samples:                          5
      vtheta_samples:                      20
      sim_time:                            1.7
      linear_granularity:                  0.05
      angular_granularity:                 0.025
      transform_tolerance:                 0.3
      xy_goal_tolerance:                   0.25 # $목표 위치 허용 오차
      trans_stopped_velocity:              0.25
      short_circuit_trajectory_evaluation: True
      stateful:                            True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale:              0.02
      PathAlign.scale:                 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale:                 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale:                  32.0
      GoalDist.scale:                  24.0
      RotateToGoal.scale:              32.0
      RotateToGoal.slowing_factor:     5.0
      RotateToGoal.lookahead_time:     -1.0

# ─────────────────────────────────────────────────────────────────────────
local_costmap: # $로봇 주변의 동적 장애물 감지 및 회피를 위한 로컬 코스트맵
  local_costmap:
    ros__parameters:
      use_sim_time:       false
      update_frequency:   5.0
      publish_frequency:  2.0
      global_frame:       odom
      robot_base_frame:   base_footprint
      rolling_window:     true
      width:              5
      height:             5
      resolution:         0.05
      # 실측 footprint: 차체 50cm(앞뒤) × 바퀴 트랙 50cm(좌우)
      #   track_width=0.50m > chassis_width=0.40m → 바퀴가 차체보다 5cm 돌출
      footprint: "[ [0.25, 0.275], [0.25, -0.275], [-0.25, -0.275], [-0.25, 0.275] ]"
      footprint_padding:  0.10   # 10cm 안전 마진 (바퀴 돌출 보상)
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin:             "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0 # $값이 높으면 운전이 과감해짐
        inflation_radius:    0.55 # $로봇 반경 + 안전 마진
      voxel_layer:
        plugin:               "nav2_costmap_2d::VoxelLayer"
        enabled:              True
        publish_voxel_map:    True
        origin_z:             0.0
        z_resolution:         0.05
        z_voxels:             16
        max_obstacle_height:  2.0
        mark_threshold:       0
        observation_sources:  scan
        scan:
          topic:               /scan
          sensor_frame:        lidar_link
          max_obstacle_height: 2.0
          clearing:            True
          marking:             True
          data_type:           "LaserScan"
          raytrace_max_range:  3.0
          raytrace_min_range:  0.0
          obstacle_max_range:  2.5
          obstacle_min_range:  0.0
      always_send_full_costmap: True

# ─────────────────────────────────────────────────────────────────────────
global_costmap: # $전역 코스트맵: 사전 빌드된 정적 맵 사용
  global_costmap:
    ros__parameters:
      use_sim_time:        false
      update_frequency:    1.0
      publish_frequency:   1.0
      global_frame:        map           # ← odom에서 map으로 변경
      robot_base_frame:    base_footprint
      # rolling_window 제거: 정적 맵 사용
      resolution:          0.05
      # 실측 footprint: 차체 50cm(앞뒤) × 바퀴 트랙 50cm(좌우)
      footprint: "[ [0.25, 0.275], [0.25, -0.275], [-0.25, -0.275], [-0.25, 0.275] ]"
      footprint_padding:   0.10
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin:    "nav2_costmap_2d::StaticLayer"
        enabled:   True
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin:              "nav2_costmap_2d::ObstacleLayer"
        enabled:             True
        observation_sources: scan
        scan:
          topic:               /scan
          sensor_frame:        lidar_link
          max_obstacle_height: 2.0
          clearing:            True
          marking:             True
          data_type:           "LaserScan"
          raytrace_max_range:  3.0
          raytrace_min_range:  0.0
          obstacle_max_range:  2.5
          obstacle_min_range:  0.0
      inflation_layer:
        plugin:              "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0 # $값이 높으면 운전이 과감해짐
        inflation_radius:    0.55 # $로봇 반경 + 안전 마진
      always_send_full_costmap: True

# ─────────────────────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time:  false
    yaml_filename: ""   # launch 파일에서 주입

map_saver:
  ros__parameters:
    use_sim_time:              false
    save_map_timeout:          5.0
    free_thresh_default:       0.25
    occupied_thresh_default:   0.65
    map_subscribe_transient_local: True

# ─────────────────────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time:               false
    planner_plugins:            ["GridBased"]
    GridBased:
      plugin:        "nav2_navfn_planner/NavfnPlanner"
      tolerance:     0.5
      use_astar:     false
      allow_unknown: true

# ─────────────────────────────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time:     false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin:         "nav2_smoother::SimpleSmoother"
      tolerance:      1.0e-10
      max_its:        1000
      do_refinement:  True

# ─────────────────────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    costmap_topic:    local_costmap/costmap_raw
    footprint_topic:  local_costmap/published_footprint
    cycle_frequency:  10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame:           odom
    robot_base_frame:       base_footprint
    transform_tolerance:    0.1
    use_sim_time:           false
    simulate_ahead_time:    2.0
    max_rotational_vel:     1.0
    min_rotational_vel:     0.4
    rotational_acc_lim:     3.2

# ─────────────────────────────────────────────────────────────────────────
waypoint_follower:
  ros__parameters:
    use_sim_time:            false
    loop_rate:               20
    stop_on_failure:         false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin:                 "nav2_waypoint_follower::WaitAtWaypoint"
      enabled:                True
      waypoint_pause_duration: 200

# ─────────────────────────────────────────────────────────────────────────
velocity_smoother:
  ros__parameters:
    use_sim_time:         false
    smoothing_frequency:  20.0
    scale_velocities:     False
    feedback:             "OPEN_LOOP"
    max_velocity:         [0.22, 0.0, 1.0]
    min_velocity:         [-0.22, 0.0, -1.0]
    max_accel:            [2.5, 0.0, 3.2]
    max_decel:            [-2.5, 0.0, -3.2]
    odom_topic:           "odom"
    odom_duration:        0.1
    deadband_velocity:    [0.0, 0.0, 0.0]
    velocity_timeout:     1.0

# ─────────────────────────────────────────────────────────────────────────
# collision_monitor 제거됨:
#   파라미터 미정의 시 lifecycle_manager가 Abort하므로 비활성화
# ─────────────────────────────────────────────────────────────────────────
